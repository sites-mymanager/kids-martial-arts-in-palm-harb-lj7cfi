<!DOCTYPE html><html><head><title>Empty Page</title></head><body><p>No content</p>
    <!-- WebBuilder Dynamic Hydration Script -->
    <script>
    (function() {
      'use strict';

      // Configuration
      // Use current origin for API calls - this allows the page to work on custom domains
      // When served via custom domain proxy (eventos.io), API calls go to eventos.io/api
      // When served directly from GitHub Pages, fall back to the original API URL
      const CONFIG = {
        fallbackApiBaseUrl: 'http://server-operator:5000',
        orgId: '64c59cf8b55bce3cc5f8ab67',
        orgSubdomain: 'winterbourne',
        debug: true // Enable debug mode to help diagnose issues
      };

      // Determine if we're on a custom domain, GitHub Pages, or org subdomain
      const isGitHubPages = window.location.hostname.endsWith('.github.io');
      const isOrgSubdomain = window.location.hostname.endsWith('.mymanager.com');
      const isCustomDomain = !isGitHubPages && !isOrgSubdomain;

      // Determine API base URL:
      // 1. If on custom domain (not github.io, not mymanager.com subdomain), use current origin
      // 2. Otherwise fall back to the configured API URL
      const apiBaseUrl = isGitHubPages ? CONFIG.fallbackApiBaseUrl : window.location.origin;
      CONFIG.apiBaseUrl = apiBaseUrl;

      // Determine App base URL for event/tournament links:
      // 1. If on custom domain (eventos.io), links should stay on custom domain
      // 2. If on GitHub Pages, links go to org subdomain (eventos.mymanager.com)
      // 3. If on org subdomain already, use current origin
      if (isCustomDomain) {
        // On custom domain like eventos.io - keep links on the same domain
        CONFIG.appBaseUrl = window.location.origin;
      } else if (isOrgSubdomain) {
        // Already on org subdomain - use current origin
        CONFIG.appBaseUrl = window.location.origin;
      } else {
        // On GitHub Pages - use org subdomain or fallback
        CONFIG.appBaseUrl = CONFIG.orgSubdomain ? 'https://' + CONFIG.orgSubdomain + '.mymanager.com' : 'https://mymanager.com';
      }

      // Log initial config
      console.log('[WebBuilder Hydration] Config:', CONFIG);
      console.log('[WebBuilder Hydration] Is GitHub Pages:', isGitHubPages);
      console.log('[WebBuilder Hydration] Is Org Subdomain:', isOrgSubdomain);
      console.log('[WebBuilder Hydration] Is Custom Domain:', isCustomDomain);
      console.log('[WebBuilder Hydration] API Base URL:', CONFIG.apiBaseUrl);
      console.log('[WebBuilder Hydration] App Base URL:', CONFIG.appBaseUrl);
      console.log('[WebBuilder Hydration] Org ID:', CONFIG.orgId);

      const API_URL = CONFIG.apiBaseUrl + '/api/webbuilder-public/' + CONFIG.orgId;
      console.log('[WebBuilder Hydration] Full API URL:', API_URL);

      // Utility: Format date
      const formatDate = (dateStr) => {
        if (!dateStr) return '';
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      };

      // Utility: Format price
      const formatPrice = (price, currency = 'USD') => {
        if (price === 0) return 'Free';
        return new Intl.NumberFormat('en-US', { style: 'currency', currency }).format(price);
      };

      // Utility: Truncate text
      const truncate = (text, maxLength = 100) => {
        if (!text || text.length <= maxLength) return text || '';
        return text.substring(0, maxLength).trim() + '...';
      };

      // Helper: Get days left until event
      const getDaysLeft = (dateStr) => {
        if (!dateStr) return null;
        const eventDate = new Date(dateStr);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        eventDate.setHours(0, 0, 0, 0);
        const diffTime = eventDate - today;
        return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      };

      // Helper: Format date range
      const formatDateRange = (startStr, endStr) => {
        if (!startStr) return '';
        const start = new Date(startStr);
        const end = endStr ? new Date(endStr) : null;
        const monthNames = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
        if (end && start.getTime() !== end.getTime()) {
          if (start.getMonth() === end.getMonth()) {
            return monthNames[start.getMonth()] + ' ' + start.getDate() + '-' + end.getDate();
          }
          return monthNames[start.getMonth()] + ' ' + start.getDate() + ' - ' + monthNames[end.getMonth()] + ' ' + end.getDate();
        }
        return monthNames[start.getMonth()] + ' ' + start.getDate();
      };

      // Helper: Format date and time
      const formatDateTime = (dateStr) => {
        if (!dateStr) return '';
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }) +
               ' at ' + date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      };

      // Component Renderers - matching editor styles exactly
      const renderers = {
        // Events component - matches editor LiveCanvas.js renderer
        'live-events': (data, container) => {
          const events = Array.isArray(data) ? data : (data.data || data.events || []);
          const filterOptions = data.filterOptions || null;

          // Get display options from data attributes (with defaults)
          const showBanner = container.dataset.showBanner !== 'false';
          const showDaysLeft = container.dataset.showDaysLeft !== 'false';
          const showDateRange = container.dataset.showDateRange !== 'false';
          const showDateTime = container.dataset.showDateTime !== 'false';
          const showLocation = container.dataset.showLocation !== 'false';
          const showHost = container.dataset.showHost !== 'false';
          const showFilters = container.dataset.showFilters !== 'false';
          const showTabs = container.dataset.showTabs !== 'false';
          const cardsPerRow = parseInt(container.dataset.cardsPerRow) || 3;
          const currentTab = container.dataset.activeTab || 'upcoming';
          const limit = parseInt(container.dataset.limit) || 12;

          // Get saved filter values from data attributes
          const savedFilters = {
            locationId: container.dataset.filterLocationId || '',
            country: container.dataset.filterCountry || '',
            categoryId: container.dataset.filterCategoryId || '',
            subcategoryId: container.dataset.filterSubcategoryId || '',
            type: container.dataset.filterType || '',
            leadSource: container.dataset.filterLeadSource || ''
          };

          // Helper to render event card
          const renderEventCard = (event) => {
            const startDate = event.start || event.eventStartDate || event.startDate;
            const endDate = event.end || event.eventEndDate || event.endDate;
            const daysLeft = getDaysLeft(startDate);
            const location = event.venueName || event.venue || event.location || (event.eventAddress && event.eventAddress.name);
            const host = event.hostName;
            const eventId = event._id || event.id;
            const isTournament = event.eventCategory === 'tournament';
            // Use full app URL for event links so they work on custom domains
            const eventPath = isTournament ? '/tournament-register/' + eventId : '/event-view/' + eventId;
            const eventUrl = CONFIG.appBaseUrl + eventPath;

            let daysLeftText = '';
            if (daysLeft !== null && showDaysLeft) {
              if (daysLeft < 0) daysLeftText = 'PAST EVENT';
              else if (daysLeft === 0) daysLeftText = 'TODAY';
              else if (daysLeft === 1) daysLeftText = '1 DAY LEFT';
              else daysLeftText = daysLeft + ' DAYS LEFT';
            }

            return `
            <a href="${eventUrl}" class="dynamic-card event-card" style="display: block; text-decoration: none; color: inherit; background: var(--card-bg, #ffffff); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer;" onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 8px 32px rgba(0,0,0,0.15)';" onmouseout="this.style.transform='';this.style.boxShadow='0 4px 24px rgba(0,0,0,0.1)';">
              ${showBanner ? `
                <div style="position: relative; width: 100%; height: 200px; overflow: hidden;">
                  ${event.eventBanner
                    ? `<img src="${event.eventBanner}" alt="${event.title}" style="width: 100%; height: 100%; object-fit: cover;">`
                    : `<div style="width: 100%; height: 100%; background: linear-gradient(135deg, var(--primary, #3b82f6), var(--secondary, #8b5cf6));"></div>`}
                  ${daysLeftText ? `<span style="position: absolute; top: 12px; right: 12px; background: var(--primary, #3b82f6); color: white; font-size: 0.7rem; font-weight: 700; padding: 6px 12px; border-radius: 20px; letter-spacing: 0.5px;">${daysLeftText}</span>` : ''}
                  ${showDateRange ? `<div style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 2rem 1rem 1rem; color: white;">
                    <div style="font-size: 1.25rem; font-weight: 800; letter-spacing: 1px;">${formatDateRange(startDate, endDate)}</div>
                  </div>` : ''}
                </div>
              ` : ''}
              <div style="padding: 1.25rem;">
                <h3 style="font-size: 1.125rem; font-weight: 700; margin: 0 0 0.75rem 0; color: var(--text, #1f2937);">${event.title || event.name || 'Event'}</h3>
                ${showDateTime ? `<p style="font-size: 0.875rem; color: var(--text-muted, #6b7280); margin: 0 0 0.5rem 0; display: flex; align-items: center; gap: 0.5rem;">
                  <span style="opacity: 0.7;">📅</span> ${formatDateTime(startDate)}
                </p>` : ''}
                ${showLocation && location ? `<p style="font-size: 0.875rem; color: var(--text-muted, #6b7280); margin: 0 0 0.5rem 0; display: flex; align-items: center; gap: 0.5rem;">
                  <span style="opacity: 0.7;">📍</span> ${typeof location === 'string' ? location : location.name || ''}
                </p>` : ''}
                ${showHost && host ? `<p style="font-size: 0.875rem; color: var(--text-muted, #6b7280); margin: 0; display: flex; align-items: center; gap: 0.5rem;">
                  <span style="opacity: 0.7;">👤</span> Hosted by ${host}
                </p>` : ''}
              </div>
            </a>
          `;
          };

          // Build header with filters and tabs
          const filterSelectStyle = 'padding: 0.5rem 1rem; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 0.875rem; background: white; cursor: pointer; min-width: 140px; color: #374151;';
          const filterLabelStyle = 'display: block; font-size: 0.75rem; font-weight: 600; color: #6b7280; margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.5px;';
          const filterGroupStyle = 'display: flex; flex-direction: column;';

          const headerHtml = (showTabs || showFilters) ? `
            <div class="events-header" style="display: block; width: 100%; margin-bottom: 2rem;">
              ${showFilters && filterOptions ? `
                <div class="events-filter-bar" style="display: flex; flex-wrap: wrap; align-items: flex-end; gap: 1rem; margin-bottom: 1rem;">
                  <div style="${filterGroupStyle}">
                    <label style="${filterLabelStyle}">Location</label>
                    <select class="events-filter" data-filter="locationId" data-label="Location" style="${filterSelectStyle}">
                      <option value="" ${!savedFilters.locationId ? 'selected' : ''}>All Locations</option>
                      ${(filterOptions.locations || []).map(l => '<option value="' + l.id + '" ' + (savedFilters.locationId === String(l.id) ? 'selected' : '') + '>' + l.label + '</option>').join('')}
                    </select>
                  </div>
                  <div style="${filterGroupStyle}">
                    <label style="${filterLabelStyle}">Country</label>
                    <select class="events-filter" data-filter="country" data-label="Country" style="${filterSelectStyle}">
                      <option value="" ${!savedFilters.country ? 'selected' : ''}>All Countries</option>
                      ${(filterOptions.countries || []).map(c => '<option value="' + c + '" ' + (savedFilters.country === c ? 'selected' : '') + '>' + c + '</option>').join('')}
                    </select>
                  </div>
                  <div style="${filterGroupStyle}">
                    <label style="${filterLabelStyle}">Category</label>
                    <select class="events-filter" data-filter="categoryId" data-label="Category" style="${filterSelectStyle}">
                      <option value="" ${!savedFilters.categoryId ? 'selected' : ''}>All Categories</option>
                      ${(filterOptions.categories || []).map(c => '<option value="' + c.id + '" ' + (savedFilters.categoryId === String(c.id) ? 'selected' : '') + '>' + c.label + '</option>').join('')}
                    </select>
                  </div>
                </div>
              ` : ''}
              ${showTabs ? `
                <div class="events-tabs" style="display: inline-flex; align-items: center; background: #f3f4f6; border-radius: 8px; padding: 4px;">
                  <button class="events-tab ${currentTab === 'upcoming' ? 'active' : ''}" data-tab="upcoming" style="padding: 0.5rem 1rem; font-weight: 600; font-size: 0.875rem; border: none; border-radius: 6px; cursor: pointer; color: ${currentTab === 'upcoming' ? 'white' : '#6b7280'}; background: ${currentTab === 'upcoming' ? 'var(--primary, #3b82f6)' : 'transparent'}; transition: all 0.2s;">
                    Upcoming
                  </button>
                  <button class="events-tab ${currentTab === 'past' ? 'active' : ''}" data-tab="past" style="padding: 0.5rem 1rem; font-weight: 600; font-size: 0.875rem; border: none; border-radius: 6px; cursor: pointer; color: ${currentTab === 'past' ? 'white' : '#6b7280'}; background: ${currentTab === 'past' ? 'var(--primary, #3b82f6)' : 'transparent'}; transition: all 0.2s;">
                    Past
                  </button>
                </div>
              ` : ''}
            </div>
          ` : '';

          // Calculate grid columns based on cardsPerRow
          const gridCols = 'repeat(' + cardsPerRow + ', minmax(280px, 1fr))';

          // Build events grid HTML
          const eventsGridHtml = events.length ? `
            <div class="events-grid" style="display: grid; grid-template-columns: ${gridCols}; gap: 1.5rem;">
              ${events.slice(0, limit).map(renderEventCard).join('')}
            </div>
          ` : '<p class="no-data" style="text-align: center; padding: 2rem; color: #6b7280;">No events found</p>';

          // Reset container styles and render content
          container.style.display = 'block';
          container.innerHTML = headerHtml + eventsGridHtml;

          // Add event listeners for tabs
          container.querySelectorAll('.events-tab').forEach(tab => {
            tab.addEventListener('click', function() {
              const newTab = this.dataset.tab;
              container.dataset.activeTab = newTab;
              container.classList.remove('loaded');
              container.classList.add('loading');
              // Re-fetch with new tab parameter
              hydrateComponent(container);
            });
          });

          // Add event listeners for filters
          container.querySelectorAll('.events-filter').forEach(filter => {
            filter.addEventListener('change', function() {
              const filterKey = this.dataset.filter;
              const attrName = 'filter' + filterKey.charAt(0).toUpperCase() + filterKey.slice(1);
              container.dataset[attrName] = this.value;
              container.classList.remove('loaded');
              container.classList.add('loading');
              hydrateComponent(container);
            });
          });
        },

        // Tournaments component
        'live-tournaments': (data, container) => {
          const tournaments = data.tournaments || data || [];
          if (!tournaments.length) {
            container.innerHTML = '<p class="no-data">No upcoming tournaments</p>';
            return;
          }
          container.innerHTML = tournaments.slice(0, 6).map(tournament => {
            const tournamentId = tournament._id || tournament.id;
            const tournamentUrl = tournament.registrationUrl || (tournamentId ? CONFIG.appBaseUrl + '/tournament-register/' + tournamentId : '#');
            return `
            <div class="dynamic-card tournament-card">
              ${tournament.image ? `<img src="${tournament.image}" alt="${tournament.name}" class="card-image">` : ''}
              <div class="card-content">
                <span class="card-date">${formatDate(tournament.startDate)}</span>
                <h3 class="card-title">${tournament.name}</h3>
                <p class="card-description">${truncate(tournament.description, 120)}</p>
                ${tournament.location ? `<span class="card-location">📍 ${tournament.location}</span>` : ''}
                <a href="${tournamentUrl}" class="card-btn">Register</a>
              </div>
            </div>
          `;
          }).join('');
        },

        // Classes component
        'live-classes': (data, container) => {
          const classes = data.classes || data || [];
          if (!classes.length) {
            container.innerHTML = '<p class="no-data">No classes available</p>';
            return;
          }
          container.innerHTML = classes.slice(0, 6).map(cls => {
            const classId = cls._id || cls.id;
            const classUrl = cls.bookUrl || (classId ? CONFIG.appBaseUrl + '/book-class/' + classId : CONFIG.appBaseUrl + '/classes');
            return `
            <div class="dynamic-card class-card">
              ${cls.image ? `<img src="${cls.image}" alt="${cls.name}" class="card-image">` : ''}
              <div class="card-content">
                <h3 class="card-title">${cls.name}</h3>
                <p class="card-description">${truncate(cls.description, 100)}</p>
                ${cls.instructor ? `<span class="card-instructor">👤 ${cls.instructor}</span>` : ''}
                ${cls.schedule ? `<span class="card-schedule">📅 ${cls.schedule}</span>` : ''}
                <a href="${classUrl}" class="card-btn">Book Now</a>
              </div>
            </div>
          `;
          }).join('');
        },

        // Memberships component
        'live-memberships': (data, container) => {
          const memberships = data.memberships || data || [];
          if (!memberships.length) {
            container.innerHTML = '<p class="no-data">No membership plans available</p>';
            return;
          }
          container.innerHTML = memberships.slice(0, 4).map((plan, index) => {
            const planId = plan._id || plan.id;
            const signupUrl = plan.signupUrl || (planId ? CONFIG.appBaseUrl + '/membership/' + planId : CONFIG.appBaseUrl + '/memberships');
            return `
            <div class="dynamic-card membership-card ${index === 1 ? 'featured' : ''}">
              <div class="card-content">
                <h3 class="card-title">${plan.name}</h3>
                <div class="card-price">
                  <span class="price-amount">${formatPrice(plan.price)}</span>
                  <span class="price-period">/${plan.billingPeriod || 'month'}</span>
                </div>
                <p class="card-description">${truncate(plan.description, 80)}</p>
                <ul class="card-features">
                  ${(plan.features || []).slice(0, 5).map(f => `<li>✓ ${f}</li>`).join('')}
                </ul>
                <a href="${signupUrl}" class="card-btn">Get Started</a>
              </div>
            </div>
          `;
          }).join('');
        },

        // Products component
        'live-products': (data, container) => {
          const products = data.products || data || [];
          if (!products.length) {
            container.innerHTML = '<p class="no-data">No products available</p>';
            return;
          }
          container.innerHTML = products.slice(0, 8).map(product => {
            const productId = product._id || product.id;
            const productUrl = product.purchaseUrl || (productId ? CONFIG.appBaseUrl + '/product/' + productId : CONFIG.appBaseUrl + '/shop');
            return `
            <div class="dynamic-card product-card">
              ${product.image ? `<img src="${product.image}" alt="${product.name}" class="card-image">` : ''}
              <div class="card-content">
                <h3 class="card-title">${product.name}</h3>
                <p class="card-description">${truncate(product.description, 80)}</p>
                <div class="card-price">${formatPrice(product.price)}</div>
                <a href="${productUrl}" class="card-btn">Buy Now</a>
              </div>
            </div>
          `;
          }).join('');
        },

        // Courses component
        'live-courses': (data, container) => {
          const courses = data.courses || data || [];
          if (!courses.length) {
            container.innerHTML = '<p class="no-data">No courses available</p>';
            return;
          }
          container.innerHTML = courses.slice(0, 6).map(course => {
            const courseId = course._id || course.id;
            const courseUrl = course.enrollUrl || (courseId ? CONFIG.appBaseUrl + '/course/' + courseId : CONFIG.appBaseUrl + '/courses');
            return `
            <div class="dynamic-card course-card">
              ${course.image ? `<img src="${course.image}" alt="${course.title}" class="card-image">` : ''}
              <div class="card-content">
                <h3 class="card-title">${course.title}</h3>
                <p class="card-description">${truncate(course.description, 100)}</p>
                ${course.level ? `<span class="card-badge">${course.level}</span>` : ''}
                ${course.duration ? `<span class="card-duration">⏱ ${course.duration}</span>` : ''}
                <a href="${courseUrl}" class="card-btn">Enroll Now</a>
              </div>
            </div>
          `;
          }).join('');
        },

        // Bookings component
        'live-bookings': (data, container) => {
          const bookings = data.bookingTypes || data || [];
          if (!bookings.length) {
            container.innerHTML = '<p class="no-data">No booking options available</p>';
            return;
          }
          container.innerHTML = bookings.slice(0, 6).map(booking => {
            const bookingId = booking._id || booking.id;
            const bookingUrl = booking.bookUrl || (bookingId ? CONFIG.appBaseUrl + '/booking/' + bookingId : CONFIG.appBaseUrl + '/bookings');
            return `
            <div class="dynamic-card booking-card">
              <div class="card-content">
                <h3 class="card-title">${booking.name}</h3>
                <p class="card-description">${truncate(booking.description, 100)}</p>
                ${booking.duration ? `<span class="card-duration">⏱ ${booking.duration} min</span>` : ''}
                ${booking.price ? `<div class="card-price">${formatPrice(booking.price)}</div>` : ''}
                <a href="${bookingUrl}" class="card-btn">Book Now</a>
              </div>
            </div>
          `;
          }).join('');
        },

        // Locations component
        'live-locations': (data, container) => {
          const locations = data.locations || data || [];
          if (!locations.length) {
            container.innerHTML = '<p class="no-data">No locations available</p>';
            return;
          }
          container.innerHTML = locations.map(location => `
            <div class="dynamic-card location-card">
              ${location.image ? `<img src="${location.image}" alt="${location.name}" class="card-image">` : ''}
              <div class="card-content">
                <h3 class="card-title">${location.name}</h3>
                <p class="card-address">📍 ${location.address}</p>
                ${location.phone ? `<p class="card-phone">📞 ${location.phone}</p>` : ''}
                ${location.hours ? `<p class="card-hours">🕐 ${location.hours}</p>` : ''}
                <a href="${location.mapUrl || '#'}" class="card-btn" target="_blank">Get Directions</a>
              </div>
            </div>
          `).join('');
        },

        // Sports Subcategories component - matches editor LiveCanvas.js renderer
        'live-sports-subcategories': (data, container) => {
          let subcategories = Array.isArray(data) ? data : (data.data || data.subcategories || []);
          const cardsPerRow = parseInt(container.dataset.cardsPerRow) || 4;
          const limit = parseInt(container.dataset.limit) || 12;
          const selectedIds = (container.dataset.selectedSubcategories || '').split(',').filter(Boolean);

          console.log('[WebBuilder Hydration] Rendering sports subcategories:', subcategories.length);

          // Filter by selected subcategories if any are specified
          if (selectedIds.length > 0) {
            subcategories = subcategories.filter(sub => {
              const subId = (sub.id || sub._id || sub.value || '').toString();
              return selectedIds.includes(subId);
            });
          }

          if (!subcategories.length) {
            container.innerHTML = '<p style="text-align: center; padding: 2rem; color: #6b7280;"><span style="font-size: 2rem; display: block; margin-bottom: 0.5rem;">🏆</span>No sports categories available.</p>';
            return;
          }

          // Calculate grid columns based on cardsPerRow
          const gridCols = 'repeat(' + cardsPerRow + ', minmax(200px, 1fr))';

          container.style.display = 'grid';
          container.style.gridTemplateColumns = gridCols;
          container.style.gap = '1.5rem';

          container.innerHTML = subcategories.slice(0, limit).map(sub => {
            const name = sub.name || sub.label || 'Category';
            const image = sub.image || sub.banner;
            const icon = sub.icon;
            const color = sub.color || '#3b82f6';
            const subId = sub.id || sub._id || sub.value || '';
            // Link to events filtered by this subcategory
            const subcategoryUrl = CONFIG.appBaseUrl + '/events?subcategoryId=' + subId;

            return `
              <a href="${subcategoryUrl}" class="dynamic-card sports-card" data-subcategory-id="${subId}" style="display: block; text-decoration: none; color: inherit; background: var(--card-bg, #ffffff); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;" onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 8px 32px rgba(0,0,0,0.15)';" onmouseout="this.style.transform='';this.style.boxShadow='0 4px 20px rgba(0,0,0,0.08)';">
                <div style="position: relative; width: 100%; height: 140px; overflow: hidden;">
                  ${image
                    ? `<img src="${image}" alt="${name}" style="width: 100%; height: 100%; object-fit: cover;">`
                    : `<div style="width: 100%; height: 100%; background: linear-gradient(135deg, ${color}, var(--secondary, #8b5cf6)); display: flex; align-items: center; justify-content: center;">
                        <span style="font-size: 3rem; color: white;">${icon || '🏆'}</span>
                      </div>`
                  }
                </div>
                <div style="padding: 1rem;">
                  <h4 style="font-size: 1rem; font-weight: 600; margin: 0; color: var(--text, #1f2937);">${name}</h4>
                </div>
              </a>
            `;
          }).join('');
        }
      };

      // Endpoint mapping for components that don't follow the live-{endpoint} pattern
      const endpointMap = {
        'live-sports-subcategories': 'event-subcategories'
      };

      // Fetch data and hydrate component
      async function hydrateComponent(container) {
        const componentType = container.dataset.component;
        // Use endpoint map if available, otherwise derive from component type
        const endpoint = endpointMap[componentType] || componentType.replace('live-', '');

        if (!renderers[componentType]) {
          console.warn('Unknown component type:', componentType);
          return;
        }

        // Show loading state
        container.classList.add('loading');

        // Build query params from data attributes
        const params = new URLSearchParams();
        if (container.dataset.limit) params.append('limit', container.dataset.limit);
        if (container.dataset.featured === 'true') params.append('featured', 'true');

        // Handle events-specific parameters
        if (componentType === 'live-events') {
          const activeTab = container.dataset.activeTab || 'upcoming';
          if (activeTab === 'upcoming') {
            params.append('upcoming', 'true');
          } else if (activeTab === 'past') {
            params.append('past', 'true');
          }

          // Add filter params if set
          if (container.dataset.filterLocationId) params.append('locationId', container.dataset.filterLocationId);
          if (container.dataset.filterCountry) params.append('country', container.dataset.filterCountry);
          if (container.dataset.filterCategoryId) params.append('categoryId', container.dataset.filterCategoryId);
          if (container.dataset.filterSubcategoryId) params.append('subcategoryId', container.dataset.filterSubcategoryId);
          if (container.dataset.filterType) params.append('type', container.dataset.filterType);
          if (container.dataset.filterLeadSource) params.append('leadSource', container.dataset.filterLeadSource);
          if (container.dataset.sortOrder) params.append('sort', container.dataset.sortOrder);
        } else if (componentType === 'live-sports-subcategories') {
          // Handle sports subcategories specific parameters
          if (container.dataset.categoryId) params.append('categoryId', container.dataset.categoryId);
          // Pass selected subcategory IDs to fetch specific ones
          const selectedIds = container.dataset.selectedSubcategories;
          if (selectedIds) {
            params.append('ids', selectedIds);
          }
        } else {
          // For non-events components, use the old upcoming attribute
          if (container.dataset.upcoming === 'true') params.append('upcoming', 'true');
          if (container.dataset.ids) params.append('ids', container.dataset.ids);
          if (container.dataset.categoryId) params.append('categoryId', container.dataset.categoryId);
        }

        const queryString = params.toString() ? '?' + params.toString() : '';
        const fetchUrl = API_URL + '/' + endpoint + queryString;
        console.log('[WebBuilder Hydration] Fetching:', fetchUrl);

        try {
          // For events component, also fetch filter options if filters are shown
          let filterOptions = null;
          if (componentType === 'live-events' && container.dataset.showFilters !== 'false') {
            try {
              const filterResponse = await fetch(API_URL + '/events/filters/options');
              if (filterResponse.ok) {
                const filterResult = await filterResponse.json();
                filterOptions = filterResult.data || null;
              }
            } catch (filterError) {
              console.warn('[WebBuilder Hydration] Could not fetch filter options:', filterError.message);
            }
          }

          const response = await fetch(fetchUrl);
          console.log('[WebBuilder Hydration] Response status:', response.status, response.statusText);

          if (!response.ok) {
            throw new Error('Failed to fetch ' + endpoint + ' - Status: ' + response.status);
          }

          const result = await response.json();
          let data = result.data || result;

          // Attach filter options to data for events renderer
          if (componentType === 'live-events' && filterOptions) {
            data = { data: Array.isArray(data) ? data : data.data || data, filterOptions: filterOptions };
          }

          console.log('[WebBuilder Hydration] Received data for', componentType, ':', data);

          renderers[componentType](data, container);
          container.classList.remove('loading');
          container.classList.add('loaded');

          if (CONFIG.debug) console.log('[WebBuilder Hydration] Hydrated:', componentType, 'with', Array.isArray(data) ? data.length : (data.data ? data.data.length : 1), 'items');
        } catch (error) {
          console.error('[WebBuilder Hydration] Error for', componentType, ':', error.message);
          console.error('[WebBuilder Hydration] Attempted URL:', fetchUrl);
          container.innerHTML = '<p class="error" style="color: #ef4444; padding: 1rem; text-align: center;">Unable to load ' + endpoint + '. API: ' + fetchUrl + '</p>';
          container.classList.remove('loading');
          container.classList.add('error');
        }
      }

      // Initialize hydration
      function initHydration() {
        const dynamicContainers = document.querySelectorAll('[data-component]');

        if (CONFIG.debug) {
          console.log('WebBuilder Hydration: Found', dynamicContainers.length, 'dynamic components');
        }

        dynamicContainers.forEach(container => {
          // Use IntersectionObserver for lazy loading
          const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                hydrateComponent(entry.target);
                observer.unobserve(entry.target);
              }
            });
          }, { rootMargin: '100px' });

          observer.observe(container);
        });
      }

      // Run on DOM ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initHydration);
      } else {
        initHydration();
      }
    })();
    </script>

      /* No data / Error states */
